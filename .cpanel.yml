---
# cPanel Git(TM) Version Control deployment configuration (cp-based).
#
# cPanel runs these tasks as one shell script (so `export` persists) from the
# repository checkout at /home/olympicd/repositories/campuschampions.in and
# copies the tracked project files into the live document root.
#
# Why this is safe for your data:
#   - .env is git-ignored, so it is NOT in the checkout -> your live .env is
#     never overwritten (it is simply not part of the copy).
#   - Uploaded files under public/assets/uploads/** are git-ignored too, so the
#     copy only lays down the .gitkeep placeholders and MERGES into the existing
#     folders. cp never deletes, so existing photos/certificates are preserved.
#   - .git and .cpanel.yml are intentionally not copied into the document root.
deployment:
  tasks:
    - export DEPLOYPATH=/home/olympicd/campuschampions.in
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/cp -Rf app config database public vendor storage composer.json composer.lock README.md .htaccess .env.example "$DEPLOYPATH/"
    - /bin/mkdir -p "$DEPLOYPATH/storage/logs" "$DEPLOYPATH/storage/cache" "$DEPLOYPATH/public/assets/uploads/contestants" "$DEPLOYPATH/public/assets/uploads/certificates"
    - /bin/chmod -R 0775 "$DEPLOYPATH/storage" "$DEPLOYPATH/public/assets/uploads"
    - test -f "$DEPLOYPATH/.env" || /bin/cp "$DEPLOYPATH/.env.example" "$DEPLOYPATH/.env" || true
